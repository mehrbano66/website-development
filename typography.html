<!DOCTYPE html>
<html>
    <head>
        <title>Typography</title>
        <style>
            h1{
                font-family:'Times New Roman', Times, serif;
            }
            h2{
                font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            h3{
                font-family:'Courier New', Courier, monospace;
            }
            h4{
                font-family:cursive;
            }
            h5{
                font-family:fantasy;
            }
            p{
                font-weight: 600;
                font-size: 50px;
            }
            h6{
                text-decoration:overline underline line-through;
            }
            .transform{
                text-transform:capitalize;
            }
        </style>

    </head>
    <body>
        <h1>serif</h1>
        <h2>san-serif</h2>
        <h3>monospace</h3>
        <h4>cursieve</h4>
        <h5>fantasy</h5>
        <p>learning about font-size</p>
        <h6>learning about text decoration</h6>
        <h1 class="transform">learning about text transformation</h1>
    </body>
</html>
