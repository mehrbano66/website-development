<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .Box1{
        width:100px;
        height:100px;
        background-color:blue;
        position:static;
        right:100px;
      }
      .Box2{
        width:100px;
        height:100px;
        background-color:blue;
        position:fixed;
        opacity:0.1;
        right:100px;
      }
      .Box3{
        width:100px;
        height:100px;
        background-color:red;
        position:sticky;
        right:100px;
      }
      .Box4{
        width:100px;
        height:100px;
        background-color:green;
        position:absolute;
        right:100px;
      }
    </style>
  </head>
  <body>
    <div class="Box1">
      I am static positioning
    </div>
    <div class="Box2">
      I am fixed positioning
    </div>
     <div class="Box3">
      I am relative positioning
    </div>
     <div class="Box4">
      I am absolute positioning
    </div>
  </body>
</html>
